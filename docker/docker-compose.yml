name: metro
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "500k"

services:
  frontend:
    image: ghcr.io/yudi/metro/metro-frontend:latest
    networks:
      - traefik
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.scope=public"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.metro-frontend.rule=Host(`metro.yudi.com.br`) && PathPrefix(`/app`)"
      - "traefik.http.routers.metro-frontend.priority=5"
      - "traefik.http.services.metro-frontend-svc.loadbalancer.server.port=4000"
      - "traefik.http.routers.metro-frontend.entrypoints=web, websecure"
      - "traefik.http.routers.metro-frontend.service=metro-frontend-svc"
      - "traefik.http.routers.metro-frontend.tls=true"
      - "traefik.http.routers.metro-frontend.tls.certResolver=letsencrypt"
      # Redirect root / to /app
      - "traefik.http.middlewares.metro-frontend-redirect-root.redirectregex.regex=^/$"
      - "traefik.http.middlewares.metro-frontend-redirect-root.redirectregex.replacement=/app"
      - "traefik.http.middlewares.metro-frontend-redirect-root.redirectregex.permanent=true"
      - "traefik.http.routers.metro-frontend-root.rule=Host(`metro.yudi.com.br`) && Path(`/`)"
      - "traefik.http.routers.metro-frontend-root.priority=100"
      - "traefik.http.routers.metro-frontend-root.entrypoints=web, websecure"
      - "traefik.http.routers.metro-frontend-root.service=metro-frontend-svc"
      - "traefik.http.routers.metro-frontend-root.tls=true"
      - "traefik.http.routers.metro-frontend-root.tls.certResolver=letsencrypt"

    depends_on:
      - backend
    logging: *default-logging
    restart: unless-stopped

  frontend-lite:
    image: ghcr.io/yudi/metro/metro-frontend-lite:latest
    networks:
      - traefik
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.scope=public"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.metro-frontend-lite.rule=Host(`metro.yudi.com.br`) && PathPrefix(`/lite`)"
      - "traefik.http.routers.metro-frontend-lite.priority=50"
      - "traefik.http.services.metro-frontend-lite-svc.loadbalancer.server.port=4000"
      - "traefik.http.routers.metro-frontend-lite.entrypoints=web, websecure"
      - "traefik.http.routers.metro-frontend-lite.service=metro-frontend-lite-svc"
      - "traefik.http.routers.metro-frontend-lite.tls=true"
      - "traefik.http.routers.metro-frontend-lite.tls.certResolver=letsencrypt"
    #      - 'traefik.http.middlewares.metro-frontend-lite-strip.stripprefix.prefixes=/lite'
    #      - 'traefik.http.routers.metro-frontend-lite.middlewares=metro-frontend-lite-strip'
    depends_on:
      - backend
    logging: *default-logging
    restart: unless-stopped

  backend:
    image: ghcr.io/yudi/metro/metro-backend:latest
    volumes:
      - /media/zfs-docker/yudi-metro/shared_import_data:/app/temp # Shared volume for COPY operations
    networks:
      - backend
      - traefik
      - default
    env_file:
      - .env
    environment:
      NODE_ENV: production
      RAIL_INTEGRATION_API_URL: ${RAIL_INTEGRATION_API_URL:-http://metro-core-private:3000/api}
    labels:
      - "traefik.enable=true"
      - "traefik.scope=public"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.metro-backend.rule=Host(`metro.yudi.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.metro-backend.priority=50"
      - "traefik.http.services.metro-backend-svc.loadbalancer.server.port=3000"
      - "traefik.http.routers.metro-backend.entrypoints=web, websecure"
      - "traefik.http.routers.metro-backend.service=metro-backend-svc"
      - "traefik.http.routers.metro-backend.tls=true"
      - "traefik.http.routers.metro-backend.tls.certResolver=letsencrypt"
    depends_on:
      db:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
      metro-core-private:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  metro-core-private:
    image: ghcr.io/yudi/metro-core-private:latest
    networks:
      - backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
    expose:
      - 3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const socket = require('node:net').connect(3000, 'localhost'); socket.on('connect', () => { socket.end(); process.exit(0) }); socket.on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  backend-migrate:
    build:
      context: ..
      dockerfile: apps/metro-backend/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
    command:
      - sh
      - -c
      - cd /app && ./node_modules/.bin/prisma migrate deploy --config prisma.config.ts
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    expose:
      - 6379
    volumes:
      - /media/zfs-docker/yudi-metro/redis:/data
    networks:
      - backend
    logging: *default-logging
    restart: unless-stopped
    command: redis-server --appendonly yes

  db:
    image: postgis/postgis:17-3.5
    #    ports:
    #      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d postgres -h localhost || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - /media/zfs-docker/yudi-metro/db:/var/lib/postgresql/data
      - /media/zfs-docker/yudi-metro/shared_import_data:/tmp/shared_import # Named volume for production COPY operations
    networks:
      - backend
    logging: *default-logging
    restart: unless-stopped

networks:
  default:
  backend:
  traefik:
    external: true
