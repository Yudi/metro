name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_DAEMON: false
  NX_NO_CLOUD: true

jobs:
  verify:
    name: Nx affected checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout trusted source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma clients
        run: bunx nx run metro-backend:prisma-generate

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v5
        with:
          main-branch-name: main

      - name: Lint affected projects
        run: bunx nx affected -t lint --parallel=3

      - name: Test affected projects
        run: bunx nx affected -t test --configuration=ci --parallel=3

      - name: Build affected projects
        run: bunx nx affected -t build --parallel=3
